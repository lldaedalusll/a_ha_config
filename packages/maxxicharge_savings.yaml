###############################################################################
#  PACKAGE: Solar Savings – Version 8 (refactored, script-based)
###############################################################################

###############################################################################
#  INPUT NUMBERS (Persistente Summen + Zeitstempel)
###############################################################################
input_number:
  saving_pv_total:
    name: "Gesamt-Ersparnis PV"
    icon: mdi:currency-eur
    min: 0
    max: 1000000
    step: 0.000001
    unit_of_measurement: "€"
    mode: box

  saving_battery:
    name: "Ersparnis Batterie"
    icon: mdi:battery
    min: 0
    max: 1000000
    step: 0.000001
    unit_of_measurement: "€"
    mode: box

  saving_pv_passthrough:
    name: "Ersparnis PV-Direktnutzung"
    icon: mdi:solar-power
    min: 0
    max: 1000000
    step: 0.000001
    unit_of_measurement: "€"
    mode: box

  last_bkw_update_battery:
    name: "Letztes BKW-Update Batterie"
    min: 0
    max: 9999999999
    step: 1

  last_bkw_update_passthrough:
    name: "Letztes BKW-Update PV Passthrough"
    min: 0
    max: 9999999999
    step: 1


###############################################################################
#  DEBUG-SCHALTER
###############################################################################
input_boolean:
  solar_savings_debug:
    name: "Solar Savings Debug Logging"
    icon: mdi:bug


###############################################################################
#  TEMPLATE-SENSOREN (gerundete Anzeige)
###############################################################################
template:
  - sensor:
      - name: "saving.pv_total"
        unique_id: "saving_pv_total_template"
        unit_of_measurement: "€"
        icon: mdi:currency-eur
        state: "{{ states('input_number.saving_pv_total') | float | round(6) }}"

      - name: "saving.battery"
        unique_id: "saving_battery_template"
        unit_of_measurement: "€"
        icon: mdi:battery
        state: "{{ states('input_number.saving_battery') | float | round(6) }}"

      - name: "saving.pv_passthrough"
        unique_id: "saving_pv_passthrough_template"
        unit_of_measurement: "€"
        icon: mdi:solar-power
        state: "{{ states('input_number.saving_pv_passthrough') | float | round(6) }}"


###############################################################################
#  SCRIPT = "METHODE" ZUR GENERISCHEN AUFSUMMIERUNG
###############################################################################
script:
  solar_savings_increment:
    alias: "Solar Savings – generische Aufsummierung"
    mode: queued
    fields:
      power_sensor:
        description: "Leistungssensor (W)"
      target_saving:
        description: "Input Number der Teil-Ersparnis"
      last_update_entity:
        description: "Input Number für den Zeitstempel"
      label:
        description: "Text für Debug"
      emoji:
        description: "Emoji für Logbook"

    sequence:
      - variables:
          now_ts: "{{ as_timestamp(now()) | float(0) }}"

          last_ts: >-
            {% set t = states(last_update_entity) | float(0) %}
            {{ t if t > 0 else now_ts }}

          dt_sec: "{{ (now_ts - last_ts) | float(0) }}"
          dt_sec_clamped: "{{ [dt_sec | float(0), 30] | min }}"
          dt_h: "{{ dt_sec_clamped | float(0) / 3600 }}"

          power: "{{ states(power_sensor) | float(0) }}"
          price: "{{ states('sensor.strom_preis_pro_kwh') | float(0) }}"

          energy: >
            {{ power | float(0) * dt_h | float(0) / 1000 }}

          delta_eur: >
            {{ energy | float(0) * price | float(0) }}

      - choose:
          - conditions: "{{ is_state('input_boolean.solar_savings_debug','on') }}"
            sequence:
              - service: system_log.write
                data:
                  level: warning
                  message: "{{ emoji }} {{ label }} Δ={{ delta_eur }} €"

      - choose:
          - conditions: "{{ is_state('input_boolean.solar_savings_debug','on') }}"
            sequence:
              - service: logbook.log
                data:
                  name: "Solar Savings"
                  message: >
                    {{ emoji }} {{ label }}:
                    power={{ power }} W,
                    dt={{ dt_h }} h,
                    Δ={{ delta_eur }} €,
                    price={{ price }} €/kWh

      - if:
          - "{{ delta_eur | float(0) > 0 }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "{{ target_saving }}"
            data:
              value: >
                {{ states(target_saving) | float(0) + delta_eur | float(0) }}

          - service: input_number.set_value
            target:
              entity_id: input_number.saving_pv_total
            data:
              value: >
                {{ states('input_number.saving_pv_total') | float(0) + delta_eur | float(0) }}

      - service: input_number.set_value
        target:
          entity_id: "{{ last_update_entity }}"
        data:
          value: "{{ now_ts }}"


###############################################################################
#  AUTOMATIONEN
###############################################################################
automation:

  ###########################################################################
  # 0️⃣ Initialisierung bei Systemstart
  ###########################################################################
  - alias: "Ersparnis-Zähler initialisieren"
    id: init_solar_savings
    trigger:
      - platform: homeassistant
        event: start
    condition:
      - condition: or
        conditions:
          - "{{ states('input_number.saving_pv_total') in ['unknown','unavailable','none'] }}"
          - "{{ states('input_number.saving_battery') in ['unknown','unavailable','none'] }}"
          - "{{ states('input_number.saving_pv_passthrough') in ['unknown','unavailable','none'] }}"
    action:
      - service: input_number.set_value
        target:
          entity_id:
            - input_number.saving_pv_total
            - input_number.saving_battery
            - input_number.saving_pv_passthrough
        data:
          value: 0
      - service: logbook.log
        data:
          name: "Solar Savings Init"
          message: "Initialisiert alle Ersparnis-Zähler auf 0"


  ###########################################################################
  # 1️⃣ Batterie
  ###########################################################################
  - alias: "Einsparung Batterie sofort aufsummieren"
    id: solar_savings_increment_battery
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.power_self_used_from_ccu_bat_discharge
    action:
      - service: script.solar_savings_increment
        data:
          power_sensor: sensor.power_self_used_from_ccu_bat_discharge
          target_saving: input_number.saving_battery
          last_update_entity: input_number.last_bkw_update_battery
          label: Batterie
          emoji: "🔋"


  ###########################################################################
  # 2️⃣ PV-Direktnutzung
  ###########################################################################
  - alias: "Einsparung PV Passthrough sofort aufsummieren"
    id: solar_savings_increment_pv_passthrough
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.power_self_used_from_ccu_passthrough
    action:
      - service: script.solar_savings_increment
        data:
          power_sensor: sensor.power_self_used_from_ccu_passthrough
          target_saving: input_number.saving_pv_passthrough
          last_update_entity: input_number.last_bkw_update_passthrough
          label: PV Passthrough
          emoji: "☀️"
