#
# this sensor fires to often, so replaced by a better version firing less often
#
# template:
#   - sensor:
#     #
#     # phase A minus desired output power from maxxisun ccu
#     #
#     # This has been the very best to be used instead of regular phase A in energy dashboard, which caused the least amount of undetected consumption
#     # 
#     - name: 'Phase a active power corrected'
#       unique_id: phase_a_active_power_corrected
#       device_class: power
#       state_class: measurement
#       icon: mdi:flash
#       unit_of_measurement: W
#       state: "{{ states('sensor.shellypro3em_08f9e0e7a100_phase_a_active_power') | float(3) + states('sensor.maxxicharge_ccu_output_power') | float(3) }}"


template:
  # Trigger-basierter Sensor (reagiert NUR auf den Shelly oder HA-Start)
  - trigger:
      - platform: state
        entity_id: sensor.shellypro3em_08f9e0e7a100_phase_a_active_power
      - platform: homeassistant
        event: start
    sensor:
      - name: 'Phase a active power corrected'
        unique_id: phase_a_active_power_corrected
        device_class: power
        state_class: measurement
        icon: mdi:flash
        unit_of_measurement: W
        state: >
          {% set shelly = states('sensor.shellypro3em_08f9e0e7a100_phase_a_active_power') | float(0) %}
          {% set maxxi = states('sensor.maxxicharge_ccu_output_power') | float(0) %}
          {{ (shelly + maxxi) | round(2) }}


  - sensor:
    - name: "draussen_kälter_als_drinnen"
      unique_id: draussen_kälter_als_drinnen
      unit_of_measurement: none
      state_class: total
      state: >
        {% if states('sensor.shelly_ht_draussen_temperature') <= states('sensor.shelly_plusht_wz_temperature')  %}
          {{ 1 }}
        {% else %}
          {{ 0 }}
        {% endif %}

