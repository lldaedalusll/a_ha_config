- id: '1719430087485'
  alias: Draußen kälter als drinnen
  description: ''
  trigger:
  - platform: state
    entity_id:
    - sensor.draussen_kalter_als_drinnen
    from: '0'
    to: '1'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  condition:
  - condition: numeric_state
    entity_id: sensor.shelly_plusht_wz_temperature
    above: 23
  action:
  - service: notify.mobile_app_pixel_7_fuu
    data:
      message: Draussen ist es kälter als drinnen.
  mode: single
- id: '1719430141114'
