- id: '1714059575462'
  alias: Müll-Licht Umschalten
  description: ''
  triggers:
  - domain: mqtt
    device_id: 3640b70c6a66ca627ce1250af26f59aa
    type: action
    subtype: press
    trigger: device
  conditions:
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: device
        type: is_off
        device_id: 509039fe92aa5c7a7eb98551b2c8085c
        entity_id: 393297c78a4e6f247805c4c85fa2f3e7
        domain: light
      - condition: device
        type: is_off
        device_id: d201232fa61671d184f3ab346f10fe21
        entity_id: f2ddd0aaf4128d3aa6bcc68d6dccc85d
        domain: switch
    - condition: and
      conditions:
      - condition: device
        type: is_on
        device_id: 509039fe92aa5c7a7eb98551b2c8085c
        entity_id: 393297c78a4e6f247805c4c85fa2f3e7
        domain: light
      - condition: device
        type: is_on
        device_id: d201232fa61671d184f3ab346f10fe21
        entity_id: f2ddd0aaf4128d3aa6bcc68d6dccc85d
        domain: switch
    enabled: true
  actions:
  - type: toggle
    device_id: 509039fe92aa5c7a7eb98551b2c8085c
    entity_id: 393297c78a4e6f247805c4c85fa2f3e7
    domain: light
  - type: toggle
    device_id: d201232fa61671d184f3ab346f10fe21
    entity_id: f2ddd0aaf4128d3aa6bcc68d6dccc85d
    domain: switch
  mode: single
